<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Notas - Refaccionaria</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding: 10px; color: #333; margin: 0; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .form-section { border: 1px solid #e1e4e8; padding: 15px; border-radius: 10px; margin-bottom: 20px; background: #fdfdfd; }
        h1 { font-size: 1.5rem; text-align: center; color: var(--primary); }
        h3 { margin-top: 15px; font-size: 1.1rem; color: var(--primary); border-left: 4px solid var(--accent); padding-left: 10px; }

        /* Grid del Formulario */
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-piezas { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; }
        
        input, select, button { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; margin-bottom: 5px; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 5px rgba(52,152,219,0.3); }
        
        button { cursor: pointer; color: white; font-weight: bold; border: none; transition: 0.2s; display: block; }
        .btn-blue { background: var(--accent); }
        .btn-green { background: var(--success); }
        .btn-red { background: var(--danger); }
        .btn-orange { background: var(--warning); }

        /* Estilo de lista de piezas temporal */
        .item-list { list-style: none; padding: 0; margin: 15px 0; border-top: 1px solid #eee; }
        .item-list li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }

        /* Tabla Responsiva (Mobile First) */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        
        @media screen and (max-width: 600px) {
            .grid-inputs, .grid-piezas { grid-template-columns: 1fr; }
            
            /* Convertir tabla en tarjetas */
            thead { display: none; }
            tr { display: block; border: 1px solid #ddd; margin-bottom: 10px; padding: 10px; border-radius: 8px; background: #fff; }
            td { display: flex; justify-content: space-between; border: none; padding: 5px 0; border-bottom: 1px solid #f0f0f0; }
            td:last-child { border-bottom: none; flex-direction: column; gap: 5px; }
            td::before { content: attr(data-label); font-weight: bold; color: var(--primary); }
            
            .btn-action-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 10px; }
        }

        @media screen and (min-width: 601px) {
            th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
            th { background: var(--primary); color: white; }
            .btn-action-group { display: flex; gap: 5px; }
        }

        .badge-deuda { color: var(--danger); font-weight: bold; }
        .badge-pagado { color: var(--success); font-weight: bold; }
        .paginacion { display: flex; justify-content: center; margin-top: 20px; gap: 5px; flex-wrap: wrap; }
    </style>
</head>
<body>

<div class="container">
    <h1> Control de notas 🛒 Refaccionaria Valencia</h1>

    <div class="form-section">
        <h3>1. Cliente</h3>
        <div class="grid-inputs">
            <input type="text" id="cliente" placeholder="Nombre del Cliente">
            <input type="tel" id="telefono" placeholder="Teléfono">
        </div>
        
        <h3>2. Refacciones</h3>
        <div class="grid-piezas">
            <input type="text" id="piezaNombre" placeholder="Pieza">
            <input type="number" id="piezaCant" placeholder="Cant.">
            <input type="number" id="piezaPrecio" placeholder="Precio">
        </div>
        <button onclick="agregarPieza()" class="btn-blue">＋ Añadir a la lista</button>
        
        <ul id="listaTemp" class="item-list"></ul>

        <h3>3. Pago</h3>
        <select id="estado" onchange="toggleAbono()">
            <option value="sin pago">Sin pago</option>
            <option value="adelanto">Con anticipo</option>
            <option value="pagado">Pagado totalmente</option>
            <option value="entregado y pagado">Entregado y pagado</option>
            <option value="entregado con abono">Entregado + abono</option>
            <option value="entregado sin pago">Entregado sin pago</option>
        </select>
        <input type="number" id="montoPagado" value="0" placeholder="Ya pagado ($)">
        
        <div id="divAbonoNuevo" style="display:none; background: #e8f8f5; padding: 10px; border-radius: 8px; margin: 10px 0;">
            <strong>Abono hoy:</strong>
            <input type="number" id="montoNuevo" placeholder="¿Cuánto paga ahora?">
        </div>

        <button onclick="guardarTodo()" class="btn-green" id="btnGuardar" style="margin-top:15px; padding: 15px;">💾 GUARDAR NOTA</button>
        <button onclick="resetearFormulario()" id="btnCancel" style="display:none; background:#95a5a6; margin-top:10px;">✕ CANCELAR</button>
    </div>

    <h3>Historial</h3>
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <input type="text" id="busqueda" onkeyup="pintarTabla()" placeholder="Buscar cliente..." style="flex: 2;">
        <input type="date" id="busquedaFecha" onchange="pintarTabla()" style="flex: 1;">
    </div>
    
    <table id="tablaNotas">
        <thead>
            <tr>
                <th>Folio</th>
                <th>Cliente</th>
                <th>Total</th>
                <th>Saldo</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
    <div id="paginacion" class="paginacion"></div>
</div>

<script>
    let tempPiezas = [];
    let db = JSON.parse(localStorage.getItem('ref_data')) || [];
    let editID = null;
    let pag = 1;

    function toggleAbono() {
        const est = document.getElementById('estado').value;
        document.getElementById('divAbonoNuevo').style.display = (est === 'entregado con abono') ? 'block' : 'none';
    }

    function agregarPieza() {
        const n = document.getElementById('piezaNombre').value;
        const c = parseFloat(document.getElementById('piezaCant').value);
        const p = parseFloat(document.getElementById('piezaPrecio').value);
        if(!n || isNaN(c) || isNaN(p)) return;
        tempPiezas.push({n, c, p, sub: c*p});
        renderTemp();
        document.getElementById('piezaNombre').value = '';
        document.getElementById('piezaCant').value = '';
        document.getElementById('piezaPrecio').value = '';
        document.getElementById('piezaNombre').focus(); 
    }

    function renderTemp() {
        const l = document.getElementById('listaTemp');
        l.innerHTML = tempPiezas.map((x, i) => `
            <li>
                <span>${x.c} x ${x.n}</span>
                <span>$${x.sub.toFixed(2)} <button onclick="tempPiezas.splice(${i},1); renderTemp()" style="display:inline; width:auto; background:none; color:red; padding:0 5px;">[X]</button></span>
            </li>`).join('');
    }

    function guardarTodo() {
        const cl = document.getElementById('cliente').value;
        if(!cl || tempPiezas.length === 0) return alert("Faltan datos");

        const total = tempPiezas.reduce((a, b) => a + b.sub, 0);
        const est = document.getElementById('estado').value;
        let pagadoTotal = parseFloat(document.getElementById('montoPagado').value) || 0;

        if (est === 'pagado' || est === 'entregado y pagado') {
            pagadoTotal = total;
        } else if (est === 'entregado con abono') {
            pagadoTotal += (parseFloat(document.getElementById('montoNuevo').value) || 0);
        }

        const nota = {
            id: editID || Date.now(),
            folio: editID ? db.find(x=>x.id===editID).folio : (db.length + 501),
            fecha: editID ? db.find(x=>x.id===editID).fecha : new Date().toLocaleString(),
            cliente: cl,
            tel: document.getElementById('telefono').value,
            piezas: [...tempPiezas],
            total: total,
            pagado: pagadoTotal,
            estado: est
        };

        if(editID) {
            db[db.findIndex(x => x.id === editID)] = nota;
        } else {
            db.push(nota);
        }

        localStorage.setItem('ref_data', JSON.stringify(db));
        generarPDF(nota);
        resetearFormulario();
        pintarTabla();
    }

    function pintarTabla() {
        const busq = document.getElementById('busqueda').value.toLowerCase();
        const busqF = document.getElementById('busquedaFecha').value;
        let filtrados = db.filter(x => x.cliente.toLowerCase().includes(busq));
        
        if(busqF) {
            filtrados = filtrados.filter(x => x.fecha.split(',')[0].split('/').reverse().join('-').includes(busqF));
        }

        filtrados.sort((a,b) => b.id - a.id);
        const visible = filtrados.slice((pag-1)*5, pag*5);
        const cuerpo = document.getElementById('cuerpoTabla');
        
        cuerpo.innerHTML = visible.map(x => {
            const saldo = x.total - x.pagado;
            return `
                <tr>
                    <td data-label="Folio">#${x.folio}</td>
                    <td data-label="Cliente">${x.cliente}</td>
                    <td data-label="Total">$${x.total.toFixed(2)}</td>
                    <td data-label="Saldo" class="${saldo > 0.1 ? 'badge-deuda' : 'badge-pagado'}">$${Math.max(0, saldo).toFixed(2)}</td>
                    <td data-label="Estado">${x.estado.toUpperCase()}</td>
                    <td>
                        <div class="btn-action-group">
                            <button class="btn-orange" onclick="editar(${x.id})">Editar</button>
                            <button class="btn-blue" onclick="reimprimir(${x.id})">PDF</button>
                            <button class="btn-red" onclick="borrar(${x.id})">Eliminar</button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
        
        let htmlPag = '';
        for(let i=1; i<=Math.ceil(filtrados.length/5); i++) {
            htmlPag += `<button onclick="pag=${i}; pintarTabla()" style="background:${pag===i?'#2c3e50':'#95a5a6'}; width:auto; display:inline; margin:2px; padding:5px 10px;">${i}</button>`;
        }
        document.getElementById('paginacion').innerHTML = htmlPag;
    }

    function editar(id) {
        const x = db.find(n => n.id === id);
        editID = x.id;
        document.getElementById('cliente').value = x.cliente;
        document.getElementById('telefono').value = x.tel;
        document.getElementById('montoPagado').value = x.pagado;
        document.getElementById('estado').value = x.estado;
        tempPiezas = [...x.piezas];
        renderTemp();
        document.getElementById('btnGuardar').innerText = "ACTUALIZAR NOTA";
        document.getElementById('btnCancel').style.display = 'block';
        window.scrollTo(0,0);
    }

    function borrar(id) {
        if(confirm("¿Eliminar?")) {
            db = db.filter(x => x.id !== id);
            localStorage.setItem('ref_data', JSON.stringify(db));
            pintarTabla();
        }
    }

    function reimprimir(id) { generarPDF(db.find(n => n.id === id)); }

    function resetearFormulario() {
        editID = null; tempPiezas = [];
        document.querySelectorAll('.form-section input').forEach(i => i.value = '');
        document.getElementById('montoPagado').value = '0';
        document.getElementById('estado').value = 'sin pago';
        document.getElementById('btnGuardar').innerText = "💾 GUARDAR NOTA";
        document.getElementById('btnCancel').style.display = 'none';
        renderTemp(); toggleAbono();
    }

    function generarPDF(n) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("NOTA DE PEDIDO", 105, 20, { align: 'center' });
        doc.setFontSize(10);
        doc.text(`Folio: ${n.folio} | ${n.cliente}`, 14, 30);
        doc.autoTable({
            startY: 40,
            head: [['Pieza', 'Cant.', 'Precio', 'Sub']],
            body: n.piezas.map(p => [p.n, p.c, `$${p.p}`, `$${p.sub}`]),
        });
        doc.text(`TOTAL: $${n.total.toFixed(2)} | SALDO: $${(n.total-n.pagado).toFixed(2)}`, 14, doc.lastAutoTable.finalY + 10);
        doc.save(`Nota_${n.folio}.pdf`);
    }

    window.onload = pintarTabla;
</script>

</body>
</html>
